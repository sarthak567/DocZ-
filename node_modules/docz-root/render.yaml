# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect repo (or `render blueprint apply`).
#
# After the API is live, open the STATIC service → Environment → add:
#   VITE_API_URL = https://<YOUR-API-SERVICE-NAME>.onrender.com/api
# Then trigger a new deploy of the static site so Vite bakes in that URL.

services:
  - type: web
    name: docz-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: docz-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
